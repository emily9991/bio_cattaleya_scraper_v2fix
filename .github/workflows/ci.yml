name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  chrome-extension:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: bio_cattaleya_scraper_v2fix/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: bio_cattaleya_scraper_v2fix

    - name: Lint JavaScript
      run: npx eslint src/ background.js content.js
      working-directory: bio_cattaleya_scraper_v2fix