<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio Cattaleya Scraper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f7f6;
      color: #2d3e2f;
      width: 320px;
      min-height: 200px;
    }

    header {
      background: #2e7d32;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .badge {
      background: #a5d6a7;
      color: #1b5e20;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      margin-left: auto;
    }

    main { padding: 14px 16px; }

    #status-box {
      background: #e8f5e9;
      border-left: 3px solid #43a047;
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #1b5e20;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 8px 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    #btn-start  { background: #43a047; color: #fff; }
    #btn-stop   { background: #ef5350; color: #fff; }
    #btn-panel  { background: #1976d2; color: #fff; }
    #btn-clear  { background: #fff; color: #555; border: 1px solid #ccc; flex: 0 0 auto; width: 80px; }

    #counter {
      text-align: center;
      font-size: 12px;
      color: #555;
    }

    #counter span {
      font-weight: 700;
      color: #2e7d32;
    }

    footer {
      border-top: 1px solid #ddd;
      padding: 8px 16px;
      font-size: 10px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>🌿 Bio Cattaleya Scraper</h1>
    <span class="badge">v2</span>
  </header>

  <main>
    <div id="status-box">Listo para extraer.</div>

    <div class="btn-row">
      <button id="btn-start">▶ Extraer</button>
      <button id="btn-stop" disabled>⏹ Detener</button>
    </div>

    <div class="btn-row">
      <button id="btn-panel">📋 Ver Panel</button>
      <button id="btn-clear">🗑 Limpiar</button>
    </div>

    <p id="counter">Productos almacenados: <span id="total">0</span></p>
  </main>

  <footer>Bio Cattaleya &copy; 2026 – Scraper Extensión Chrome</footer>

  <script src="popup.js"></script>
</body>
</html>
