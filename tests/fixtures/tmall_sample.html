<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试商品 - 天猫Tmall.com</title>
</head>
<body>
    <div class="tb-detail-hd">
        <h1 data-spm="itemId" class="tb-main-title">测试商品标题</h1>
    </div>
    
    <div class="tb-gallery">
        <div id="J_ImgBooth">
            <img src="https://example.com/main-image.jpg" alt="测试商品">
        </div>
        <div class="tb-gallery-list">
            <img src="https://example.com/image1.jpg" alt="图片1">
            <img src="https://example.com/image2.jpg" alt="图片2">
            <img src="https://example.com/image3.jpg" alt="图片3">
        </div>
    </div>
    
    <div class="tb-detail-bd">
        <div class="tb-rmb-num">
            <span class="tm-price-cur">¥99.99</span>
        </div>
        <div class="tm-price-ori">
            <span class="tm-price-ori">¥199.99</span>
        </div>
        
        <div class="tb-prop-color">
            <a href="#">红色</a>
            <a href="#">蓝色</a>
            <a href="#">黑色</a>
        </div>
        
        <div class="tb-prop-size">
            <a href="#">S</a>
            <a href="#">M</a>
            <a href="#">L</a>
            <a href="#">XL</a>
        </div>
        
        <div class="tb-count">
            <span>库存: 100件</span>
        </div>
        
        <div class="tb-seller-name">
            <span>测试店铺</span>
        </div>
        
        <div class="tb-rate-score">
            <span>4.5分</span>
        </div>
    </div>
    
    <div class="tb-detail-desc">
        <div id="description">
            <p>这是测试商品的详细描述。</p>
            <ul>
                <li>特性1</li>
                <li>特性2</li>
                <li>特性3</li>
            </ul>
        </div>
    </div>
    
    <div class="crumb">
        <a href="#">首页</a> &gt; <a href="#">分类</a> &gt; <a href="#">子分类</a>
    </div>
    
    <div class="brand-name">
        <span>测试品牌</span>
    </div>
    
    <div class="item-no">
        <span>SKU: TEST123456</span>
    </div>
</body>
</html>
